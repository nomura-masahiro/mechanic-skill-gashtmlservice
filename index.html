<!DOCTYPE html>
<html lang="ja">
<head>

  <style>
    body {
      font-family: sans-serif;

    .menu {
      width: 360px;
      margin: 40px auto;
      background: white;
      padding: 30px;

    .menu button {
      display: block;

      color: black;
      border: 1px solid #666;
      border-radius: 4px;
      background-color: #f0f0f0;
      cursor: pointer;
    }
    .menu button:hover {
      background-color: #e0e0e0;
    }
    .description {
      font-size: 13px;
      color: #666;
      margin-bottom: 15px;
    }

<body>

<div class="menu">

    整備士スキル登録
  </button>
  <div class="description">
    フリーランス自動車整備士の方はこちら

  <!-- 整備工場用（静的ページ） -->

  </div>

</div>

function openMechanic() {
